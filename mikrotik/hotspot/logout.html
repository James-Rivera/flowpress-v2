<html>
<head>
<title>CJ NET hotspot > logout</title>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="-1">
<style type="text/css">
body{margin:0;padding:32px 16px;background:#f3efe7;color:#171717;font-size:14px;font-family:Segoe UI,Arial,sans-serif}
.shell{display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{width:100%;max-width:420px;background:#fff;border:1px solid rgba(23,23,23,.08);border-radius:18px;padding:24px;text-align:center;box-shadow:0 16px 34px rgba(20,23,31,.08)}
.logo{display:block;width:100%;max-width:170px;height:auto;margin:0 auto}
h1{font-size:30px;line-height:1.02;margin:18px 0 0}
p{margin:14px 0 0;color:#5f5b52;line-height:1.5}
table{width:100%;margin-top:18px;border-collapse:collapse;border:1px solid rgba(23,23,23,.1);overflow:hidden;border-radius:14px}
td{padding:10px 12px;border-bottom:1px solid rgba(23,23,23,.08);font-size:14px}
tr:last-child td{border-bottom:none}
td:first-child{text-align:right;color:#5f5b52;font-weight:600;width:44%}
td:last-child{text-align:left;color:#171717}
input{margin-top:20px;width:100%;padding:14px 16px;border:0;border-radius:14px;background:#ffd400;color:#171717;font-size:16px;font-weight:700}
</style>
</head>

<body>
<script language="JavaScript">
<!--
    function openLogin() {
	if (window.name != 'hotspot_logout') return true;
	open('$(link-login)', '_blank', '');
	window.close();
	return false;
    }
//-->
</script>

<div class="shell">
  <div class="card">
    <img src="logo.svg" alt="CJ NET" class="logo" />
    <h1>Logged out</h1>
    <p>Your hotspot session has ended.</p>
    <table>
      <tr><td>user name</td><td>$(username)</td></tr>
      <tr><td>IP address</td><td>$(ip)</td></tr>
      <tr><td>MAC address</td><td>$(mac)</td></tr>
      <tr><td>session time</td><td>$(uptime)</td></tr>
      $(if session-time-left)
      <tr><td>time left</td><td>$(session-time-left)</td></tr>
      $(endif)
      <tr><td>bytes up / down</td><td>$(bytes-in-nice) / $(bytes-out-nice)</td></tr>
    </table>
    <form action="$(link-login)" name="login" onSubmit="return openLogin()">
      <input type="submit" value="Log in again">
    </form>
  </div>
</div>
</body>
</html>
